spring:
  application:
    name: after-sale-agent-platform
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
      embedding: ${SPRING_AI_MODEL_EMBEDDING:none}
      audio:
        speech: ${SPRING_AI_MODEL_AUDIO_SPEECH:none}
        transcription: ${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:none}
      image: ${SPRING_AI_MODEL_IMAGE:none}
      moderation: ${SPRING_AI_MODEL_MODERATION:none}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p requestId=%X{requestId:-} ticketId=%X{ticketId:-} agentRunId=%X{agentRunId:-} subtaskId=%X{subtaskId:-} toolName=%X{toolName:-} approvalRequestId=%X{approvalRequestId:-}"

agent:
  rag:
    enabled: ${AFTERSALE_RAG_ENABLED:false}
    vector-store:
      provider: ${AFTERSALE_VECTOR_STORE_PROVIDER:none}
      pgvector:
        enabled: ${AFTERSALE_PGVECTOR_ENABLED:false}
        jdbc-url: ${AFTERSALE_PGVECTOR_URL:}
        username: ${AFTERSALE_PGVECTOR_USERNAME:}
        password: ${AFTERSALE_PGVECTOR_PASSWORD:}
        schema: ${AFTERSALE_PGVECTOR_SCHEMA:public}
        initialize-schema: false
        dimensions: ${AFTERSALE_EMBEDDING_DIMENSION:1536}
  spring-ai:
    enabled: ${SPRING_AI_ENABLED:false}
    chat-enabled: ${SPRING_AI_CHAT_ENABLED:false}
    embedding-enabled: ${SPRING_AI_EMBEDDING_ENABLED:false}
    provider-type: ${SPRING_AI_PROVIDER_TYPE:openai}
    api-key: ${SPRING_AI_OPENAI_API_KEY:}
    endpoint-host: ${SPRING_AI_ENDPOINT_HOST:spring-ai-managed}
  planner:
    mode: rule
    llm:
      provider: ${AFTERSALE_LLM_PROVIDER:openai-responses}
      model: ${AFTERSALE_LLM_MODEL:gpt-4.1-mini}
      api-key: ${OPENAI_API_KEY:}
      endpoint: ${OPENAI_RESPONSES_ENDPOINT:https://api.openai.com/v1/responses}
      timeout-seconds: 30
      dashscope:
        api-key: ${DASHSCOPE_API_KEY:}
        base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/api/v2/apps/protocols/compatible-mode/v1}
        responses-endpoint: ${DASHSCOPE_RESPONSES_ENDPOINT:}
        chat-completions-endpoint: ${DASHSCOPE_CHAT_COMPLETIONS_ENDPOINT:}
      budget:
        system-prompt-tokens: 2000
        history-tokens: 4000
        rag-context-tokens: 8000
        tool-catalog-tokens: 2000
        max-output-tokens: 1000
        total-input-tokens: 16000
