spring:
  application:
    name: after-sale-agent-platform
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p requestId=%X{requestId:-} ticketId=%X{ticketId:-} agentRunId=%X{agentRunId:-} subtaskId=%X{subtaskId:-} toolName=%X{toolName:-} approvalRequestId=%X{approvalRequestId:-}"

agent:
  planner:
    mode: rule
    llm:
      provider: openai
      model: ${AFTERSALE_LLM_MODEL:gpt-4o-mini}
      api-key: ${OPENAI_API_KEY:}
      endpoint: ${OPENAI_RESPONSES_ENDPOINT:https://api.openai.com/v1/responses}
      timeout-seconds: 30
      budget:
        system-prompt-tokens: 2000
        history-tokens: 4000
        rag-context-tokens: 8000
        tool-catalog-tokens: 2000
        max-output-tokens: 1000
        total-input-tokens: 16000
