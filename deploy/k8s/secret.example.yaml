apiVersion: v1
kind: Secret
metadata:
  name: after-sale-agent-platform-secret
  labels:
    app: after-sale-agent-platform
type: Opaque
stringData:
  # -----------------------------------------------------------
  # THIS IS AN EXAMPLE ONLY. DO NOT USE IN PRODUCTION AS-IS.
  #
  # All values are placeholders. Replace with real secrets
  # through external secret manager, sealed secrets, or
  # deployment platform injection.
  #
  # Do NOT commit this file renamed as "secret.yaml".
  # Do NOT base64-encode real secrets here.
  # -----------------------------------------------------------

  # API key auth (security-api-key profile)
  AFTERSALE_SECURITY_ADMIN_API_KEY: "REPLACE_WITH_RUNTIME_SECRET"
  AFTERSALE_SECURITY_SUPERVISOR_API_KEY: "REPLACE_WITH_RUNTIME_SECRET"
  AFTERSALE_SECURITY_OPERATOR_API_KEY: "REPLACE_WITH_RUNTIME_SECRET"
  AFTERSALE_SECURITY_SYSTEM_SERVICE_API_KEY: "REPLACE_WITH_RUNTIME_SECRET"

  # MySQL (optional — only when mysql profile is used)
  # AFTERSALE_MYSQL_URL: "REPLACE_WITH_RUNTIME_SECRET"
  # AFTERSALE_MYSQL_USERNAME: "REPLACE_WITH_RUNTIME_SECRET"
  # AFTERSALE_MYSQL_PASSWORD: "REPLACE_WITH_RUNTIME_SECRET"

  # PGvector (optional — only when rag-postgres profile is used)
  # AFTERSALE_PGVECTOR_URL: "REPLACE_WITH_RUNTIME_SECRET"
  # AFTERSALE_PGVECTOR_USERNAME: "REPLACE_WITH_RUNTIME_SECRET"
  # AFTERSALE_PGVECTOR_PASSWORD: "REPLACE_WITH_RUNTIME_SECRET"

  # LLM provider keys (optional — only when live LLM is used)
  # OPENAI_API_KEY: "REPLACE_WITH_RUNTIME_SECRET"
  # DASHSCOPE_API_KEY: "REPLACE_WITH_RUNTIME_SECRET"
  # SPRING_AI_OPENAI_API_KEY: "REPLACE_WITH_RUNTIME_SECRET"
