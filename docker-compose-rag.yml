services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: aftersale-pgvector
    environment:
      POSTGRES_DB: ${AFTERSALE_PGVECTOR_DATABASE:-after_sale_agent_rag}
      POSTGRES_USER: ${AFTERSALE_PGVECTOR_USERNAME:-aftersale_rag}
      POSTGRES_PASSWORD: ${AFTERSALE_PGVECTOR_PASSWORD:-aftersale_rag}
    ports:
      - "${AFTERSALE_PGVECTOR_PORT:-5433}:5432"
    volumes:
      - aftersale_pgvector_data:/var/lib/postgresql/data
      - ./src/main/resources/schema-rag-postgres.sql:/docker-entrypoint-initdb.d/01-schema-rag-postgres.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  aftersale_pgvector_data:
