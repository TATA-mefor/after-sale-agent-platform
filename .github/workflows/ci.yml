name: quality-gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Maven quality gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn -B --no-transfer-progress test

      - name: Run Checkstyle
        run: mvn -B --no-transfer-progress checkstyle:check

      - name: Run SpotBugs
        run: mvn -B --no-transfer-progress spotbugs:check

      - name: Run ArchitectureTest
        run: mvn -B --no-transfer-progress test -Dtest=ArchitectureTest

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Build local CI image
        run: docker build -t after-sale-agent-platform:ci .
