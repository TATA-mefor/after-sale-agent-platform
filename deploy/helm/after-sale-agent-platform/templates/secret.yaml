{{/*
Secret template — only renders when secrets.create is true and existingSecret is empty.
Production deployments MUST use external secret manager, sealed secrets, or
cluster secret process instead of this placeholder template.
*/}}
{{- define "after-sale-agent-platform.secretName" -}}
{{- if .Values.existingSecret -}}
{{- .Values.existingSecret -}}
{{- else if .Values.secrets.create -}}
{{- include "after-sale-agent-platform.fullname" . -}}-secret
{{- else -}}
{{- include "after-sale-agent-platform.fullname" . -}}-secret
{{- end -}}
{{- end -}}

{{- if and .Values.secrets.create (empty .Values.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "after-sale-agent-platform.fullname" . }}-secret
  labels:
    {{- include "after-sale-agent-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  # -----------------------------------------------------------
  # THIS SECRET IS GENERATED FROM VALUES PLACEHOLDERS.
  # DO NOT USE IN PRODUCTION WITHOUT EXTERNAL SECRET INJECTION.
  # Set existingSecret to use a pre-created Secret instead.
  # -----------------------------------------------------------
  AFTERSALE_SECURITY_ADMIN_API_KEY: {{ .Values.secrets.adminApiKey | quote }}
  AFTERSALE_SECURITY_SUPERVISOR_API_KEY: {{ .Values.secrets.supervisorApiKey | quote }}
  AFTERSALE_SECURITY_OPERATOR_API_KEY: {{ .Values.secrets.operatorApiKey | quote }}
  AFTERSALE_SECURITY_SYSTEM_SERVICE_API_KEY: {{ .Values.secrets.systemServiceApiKey | quote }}
{{- end }}
